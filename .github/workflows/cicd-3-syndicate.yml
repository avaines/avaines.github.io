name: CICD 3 - Syndicate Content

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["CICD 2 - Build and Deploy"]
    types: [completed]
    branches: [main]

permissions:
  contents: write # Needed to commit state file

jobs:
  syndicate:
    name: Syndicate
    runs-on: ubuntu-latest
    # Only run if the build/deploy workflow succeeded
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Need full history to detect changed posts
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run syndication
        env:
          # Bluesky
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_PASSWORD: ${{ secrets.BLUESKY_PASSWORD }}

          # dev.to
          DEVTO_API_KEY: ${{ secrets.DEVTO_API_KEY }}

          # Hashnode
          HASHNODE_TOKEN: ${{ secrets.HASHNODE_TOKEN }}
          HASHNODE_PUBLICATION_ID: ${{ secrets.HASHNODE_PUBLICATION_ID }}

          # Mastodon
          MASTODON_ACCESS_TOKEN: ${{ secrets.MASTODON_ACCESS_TOKEN }}
          MASTODON_INSTANCE: ${{ secrets.MASTODON_INSTANCE }}

          # Medium
          MEDIUM_TOKEN: ${{ secrets.MEDIUM_TOKEN }}

          # Substack (optional)
          SUBSTACK_API_KEY: ${{ secrets.SUBSTACK_API_KEY }}
          SUBSTACK_PUBLICATION_ID: ${{ secrets.SUBSTACK_PUBLICATION_ID }}

          # Twitter/X
          TWITTER_APP_KEY: ${{ secrets.TWITTER_APP_KEY }}
          TWITTER_APP_SECRET: ${{ secrets.TWITTER_APP_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_SECRET: ${{ secrets.TWITTER_ACCESS_SECRET }}

        run: npm run syndicate

      - name: Commit syndication state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/syndication-state.json
          git diff --quiet && git diff --staged --quiet || (
            git commit -m "Update syndication state [skip ci]" &&
            git push
          )
