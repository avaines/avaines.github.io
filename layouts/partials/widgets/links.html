{{ "<!-- links -->" | safeHTML }}
{{ with site.Params.blog_links }}
<div class="widget">
  <h5 class="widget-title"><span>Blogroll</span></h5>
  <ul class="list-unstyled mb-0">
    {{ range . }}
    <li class="mb-3">
      <a href="{{ .url | safeURL }}" target="_blank" rel="noopener noreferrer" class="font-weight-bold">{{ .name }}</a>
      {{ with .description }}
      <p class="text-muted small mb-0">{{ . }}</p>
      {{ end }}
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
